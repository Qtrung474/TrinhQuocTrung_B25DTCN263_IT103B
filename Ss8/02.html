<!DOCTYPE html>
<html lang="en">

<body>
    <script>
        const playerNames = [
    "Messi",
    "Ronaldo",
    "Neymar",
    "De Bruyne",
    "Kante",
    "Van Dijk",
    "Alisson",
];

function getUpperNames(names) {
    return names.map(function(name) {
        return name.toUpperCase();
    });
}

const players = getUpperNames(playerNames);
console.log(players);
    </script>
</body>
</html>
