<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const players = [
            "Messi - Forward - 25 - 15",
            "Ronaldo - Forward - 30 - 10",
            "Neymar - Forward - 18 - 20",
            "De Bruyne - Midfielder - 8 - 25",
            "Kante - Midfielder - 2 - 5",
            "Van Dijk - Defender - 5 - 3",
            "Alisson - Goalkeeper - 0 - 1",
        ];

        function reportTopPerformers(minPerformance, playerList) {
            const topPerformers = playerList
                .map(function (item) {
                    const parts = item.split(" - ");
                    const name = parts[0];
                    const goals = parseInt(parts[2]);
                    const assists = parseInt(parts[3]);
                    return {
                        name: name,
                        performance: goals + assists
                    };
                })
                .filter(function (player) {
                    return player.performance >= minPerformance;
                });

            topPerformers.forEach(function (player) {
                console.log(`${player.name}: ${player.performance}`);
            });

            const totalPerformance = topPerformers.reduce(function (sum, player) {
                return sum + player.performance;
            }, 0);

            console.log(`Tổng hiệu suất: ${totalPerformance}`);

            return totalPerformance;
        }

        reportTopPerformers(30, players);
    </script>
</body>

</html>
