<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const players = [
            "Messi - Forward - 25 - 15 - 34",
            "Ronaldo - Forward - 30 - 10 - 38",
            "Neymar - Forward - 18 - 20 - 32",
            "De Bruyne - Midfielder - 8 - 25 - 35",
            "Kante - Midfielder - 2 - 5 - 36",
            "Van Dijk - Defender - 5 - 3 - 33",
            "Alisson - Goalkeeper - 0 - 1 - 37",
        ];

        function reportByPosition(playerList, minGoals = 5) {
            const statsByPosition = playerList
                .map(item => {
                    const [name, pos, goals, assists, matches] = item.split(" - ");
                    return {
                        position: pos,
                        goals: parseInt(goals),
                        assists: parseInt(assists),
                        matches: parseInt(matches)
                    };
                })
                .filter(p => p.goals >= minGoals)
                .reduce((acc, p) => {
                    if (!acc[p.position]) {
                        acc[p.position] = { count: 0, tGoals: 0, tAssists: 0, tMatches: 0 };
                    }
                    acc[p.position].count++;
                    acc[p.position].tGoals += p.goals;
                    acc[p.position].tAssists += p.assists;
                    acc[p.position].tMatches += p.matches;
                    return acc;
                }, {});

            console.log("BÁO CÁO HIỆU SUẤT THEO VỊ TRÍ");

            Object.keys(statsByPosition).forEach(pos => {
                const s = statsByPosition[pos];
                const avg = ((s.tGoals + s.tAssists) / s.tMatches).toFixed(2);
                console.log(`${pos}:`);
                console.log(`- Số cầu thủ: ${s.count}`);
                console.log(`- Tổng bàn thắng: ${s.tGoals}`);
                console.log(`- Tổng kiến tạo: ${s.tAssists}`);
                console.log(`- Tổng số trận: ${s.tMatches}`);
                console.log(`- Trung bình hiệu suất/trận: ${avg}\n`);
            });

            const totalTeamGoals = Object.values(statsByPosition)
                .reduce((sum, s) => sum + s.tGoals, 0);

            console.log("------------------------");
            console.log(`Tổng bàn thắng toàn đội : ${totalTeamGoals}`);
        }

        reportByPosition(players, 5);
    </script>
</body>

</html>
