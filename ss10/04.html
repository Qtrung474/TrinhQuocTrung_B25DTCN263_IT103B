<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const players = [
            { name: "Messi", years: 18, salary: 100 },
            { name: "Ronaldo", years: 20, salary: 95 },
            { name: "Neymar", years: 12, salary: 90 },
            { name: "Mbappe", years: 7, salary: 85 },
            { name: "Haaland", years: 5, salary: 80 },
            { name: "Modric", years: 22, salary: 70 },
            { name: "Benzema", years: 19, salary: 75 }
        ];

        function analyzeSalary(minYears, teamPlayers) {
            const filtered = teamPlayers.filter(p => p.years >= minYears);

            if (filtered.length === 0) {
                return {
                    totalSalary: 0,
                    highestPaid: null,
                    lowestPaid: null
                };
            }

            const totalSalary = filtered.reduce((sum, p) => sum + p.salary, 0);

            let highestPaid = filtered[0];
            let lowestPaid = filtered[0];

            for (let i = 1; i < filtered.length; i++) {
                if (filtered[i].salary > highestPaid.salary) highestPaid = filtered[i];
                if (filtered[i].salary < lowestPaid.salary) lowestPaid = filtered[i];
            }

            return {
                totalSalary,
                highestPaid,
                lowestPaid
            };
        }

        console.log(analyzeSalary(10, players));
        console.log(analyzeSalary(30, players));
    </script>
</body>

</html>
