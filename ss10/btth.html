<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let squad = [
            { id: 1, name: "Nguyen Van A", goals: 10, position: "FW" },
            { id: 2, name: "Tran Van B", goals: 5, position: "MF" },
            { id: 3, name: "Le Van C", goals: 0, position: "DF" },
            { id: 4, name: "Pham Van D", goals: 12, position: "FW" },
            { id: 5, name: "Dang Van E", goals: 0, position: "GK" }
        ];

        let check = true;
        while (check) {
           

            let choice = +prompt(`=== QUẦN LÝ ĐỘI BÓNG (OBJECT) ===
1. Xem danh sách
2. Thêm cầu thủ
3. Tìm kiếm (theo ID)
4. Cập nhật bàn thắng
5. Xóa cầu thủ
0. Thoát
            `)

            switch (choice) {
                case 1:
                    console.log("=> DANH SÁCH:");
                    squad.forEach(player => {
                        console.log(`Mã ${player.id} - ${player.name} (${player.position}): ${player.goals} bàn`);
                    });
                    break;

                case 2:
                    let name = prompt("Nhập tên:");
                    let goals = Number(prompt("Nhập số bàn thắng:"));
                    let pos = prompt("Nhập vị trí:");
                    let id = squad.length > 0 ? squad[squad.length - 1].id + 1 : 1;

                    let newPlayer = { id: id, name: name, goals: goals, position: pos };
                    squad.push(newPlayer);
                    break;

                case 3:
                    let searchId = Number(prompt("Nhập ID cần xem:"));
                    let found = squad.find(p => p.id === searchId);
                    if (found) {
                        console.log(`=> Mã ${found.id} - ${found.name} (${found.position}): ${found.goals} bàn`);
                    } else {
                        console.log("Không tìm thấy");
                    }
                    break;

                case 4:
                    let updateId = Number(prompt("Nhập ID cầu thủ vừa ghi bàn:"));
                    let player = squad.find(p => p.id === updateId);
                    if (player) {
                        player.goals += 1;
                        console.log(`=> Đã cập nhật: ${player.name} hiện có ${player.goals} bàn thắng.`);
                    }
                    break;

                case 5:
                    let deleteId = Number(prompt("Nhập ID cần xóa:"));
                    let index = squad.findIndex(p => p.id === deleteId);
                    if (index !== -1) {
                        squad.splice(index, 1);
                    }
                    break;

                case 0:
                    check = false;
                    break;
            }
        }
    </script>
</body>

</html>
