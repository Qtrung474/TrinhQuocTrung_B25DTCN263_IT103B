<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Nhân Viên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <h1>👥 Quản Lý Nhân Viên</h1>
        </header>

        <main class="content-container">
            <section class="form-section">
                <h2 id="form-title">Thêm Nhân Viên Mới</h2>
                <form id="employee-form">
                    <div class="grid-form">
                        <div class="form-group">
                            <label>Họ và Tên <span class="required">*</span></label>
                            <input type="text" id="fullname" placeholder="Nhập họ và tên...">
                        </div>
                        <div class="form-group">
                            <label>Ngày Sinh <span class="required">*</span></label>
                            <input type="date" id="dob">
                        </div>
                        <div class="form-group">
                            <label>Email <span class="required">*</span></label>
                            <input type="text" id="email" placeholder="example@email.com">
                        </div>
                        <div class="form-group">
                            <label>Địa Chỉ <span class="required">*</span></label>
                            <input type="text" id="address" placeholder="Nhập địa chỉ...">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="btn-submit" class="btn-primary">➕ Thêm Nhân Viên</button>
                        <button type="button" id="btn-cancel" class="btn-secondary" style="display: none;">✖ Hủy</button>
                    </div>
                </form>
            </section>

            <section class="list-section">
                <h2>Danh Sách Nhân Viên</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th class="col-id">ID</th>
                                <th>Họ và Tên</th>
                                <th>Ngày Sinh</th>
                                <th>Email</th>
                                <th>Địa Chỉ</th>
                                <th>Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody id="employee-table-body">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer>
            <p>Tổng số nhân viên: <span id="total-count">0</span></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
