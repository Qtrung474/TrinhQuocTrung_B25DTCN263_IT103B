<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý công việc Tết</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fdfaf0;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }
        .container {
            width: 450px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #d32f2f;
            color: white;
            padding: 25px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 22px;
        }
        .header p {
            margin: 5px 0 0;
            font-size: 13px;
            opacity: 0.8;
        }
        .input-group {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        input:focus {
            border-color: #ffa000;
        }
        button {
            padding: 10px 20px;
            background: #ffa000;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #f57c00;
        }
        .todo-list {
            padding: 20px;
            list-style: none;
            margin: 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .todo-item {
            background: #fffef2;
            margin-bottom: 12px;
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid #ffa000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .todo-item.completed {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }
        .todo-item.completed span {
            text-decoration: line-through;
            color: #888;
        }
        .circle-icon {
            width: 20px;
            height: 20px;
            border: 2px solid #ffa000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .completed .circle-icon {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
            font-size: 12px;
        }
        .completed .circle-icon::after {
            content: '✓';
        }
        .footer {
            padding: 15px;
            text-align: center;
            font-size: 11px;
            color: #999;
            background: #fafafa;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Công việc chuẩn bị Tết</h1>
            <p>Thêm công việc mới & đánh dấu hoàn thành</p>
        </div>

        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Nhập công việc mới...">
            <button id="btnAdd">Thêm</button>
        </div>

        <ul id="todoContainer" class="todo-list"></ul>

        <div class="footer">
            Mọi thay đổi được lưu tự động vào localStorage • Refresh để kiểm tra
        </div>
    </div>

    <script>
        let todos = JSON.parse(localStorage.getItem("myTodos")) || [
            { id: 1, task: "Mua bánh chưng", done: true },
            { id: 2, task: "Dọn nhà đón Tết", done: true },
            { id: 3, task: "Gói bánh chưng", done: false },
            { id: 4, task: "Trang trí nhà cửa bằng hoa mai, hoa đào", done: false }
        ];

        const todoContainer = document.getElementById('todoContainer');
        const todoInput = document.getElementById('todoInput');
        const btnAdd = document.getElementById('btnAdd');

        function renderTodos() {
            todoContainer.innerHTML = todos.map(item => `
                <li class="todo-item ${item.done ? 'completed' : ''}" onclick="toggleTask(${item.id})">
                    <div class="circle-icon"></div>
                    <span>${item.task}</span>
                </li>
            `).join('');
            localStorage.setItem("myTodos", JSON.stringify(todos));
        }

        function addNewTask() {
            const taskText = todoInput.value.trim();
            if (taskText === "") return;

            const newTask = {
                id: Date.now(),
                task: taskText,
                done: false
            };

            todos.push(newTask);
            renderTodos();
            todoInput.value = "";
            todoInput.focus();
        }

        function toggleTask(id) {
            todos = todos.map(item => 
                item.id === id ? { ...item, done: !item.done } : item
            );
            renderTodos();
        }

        btnAdd.addEventListener('click', addNewTask);

        todoInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                addNewTask();
            }
        });

        renderTodos();
    </script>
</body>
</html>
