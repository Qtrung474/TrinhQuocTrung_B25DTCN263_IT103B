<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        let students = [
            { id: 1, name: "Nguyễn Văn A", score: 8.5, gender: "Nam" },
            { id: 2, name: "Trần Thị B", score: 4.2, gender: "Nữ" },
            { id: 3, name: "Lê Văn C", score: 9.0, gender: "Nam" },
            { id: 4, name: "Phạm Thị D", score: 5.5, gender: "Nữ" },
            { id: 5, name: "Hoàng Văn E", score: 3.8, gender: "Nam" }
        ];

        function getExcellentStudents(list) {
            const result = list.filter(student => student.score >= 8.0);
            console.log(result);
            return result;
        }

        function checkWeakStudents(list) {
            const hasWeak = list.some(student => student.score < 4.0);
            const message = hasWeak ? "Có sinh viên yếu" : "Không có sinh viên yếu";
            console.log(message);
            return message;

        }
        function formatStudentLabels(list) {
            const studentLabels = list.map(student => `Tên: ${student.name} - Điểm: ${student.score}`);
            console.log(studentLabels);
            return studentLabels;
        }


            getExcellentStudents(students);
            checkWeakStudents(students);
            formatStudentLabels(students);

    </script>




</body>

</html>
